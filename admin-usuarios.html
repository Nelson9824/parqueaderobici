<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Usuarios | QRide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <nav class="bg-white shadow-md sticky top-0 z-50" style="border-bottom:3px solid #FF7A00">
    <div class="px-4 flex items-center justify-between h-14">
      <div class="flex items-center gap-2">
        <img src="image-1.png" alt="QRide" style="height:38px;object-fit:contain">
        <span class="text-gray-500 text-xs">Admin</span>
      </div>
      <button onclick="logout()" class="text-sm text-orange-500 font-semibold flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        Salir
      </button>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 pb-20 px-4 pt-4 max-w-2xl mx-auto w-full">
    <h1 class="text-xl font-bold mb-1" style="color:#044C71">Gestión de Usuarios</h1>
    <p class="text-gray-500 text-sm mb-4">Administra los usuarios del sistema</p>

    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm p-3 mb-4 flex items-center gap-2">
      <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Buscar usuario..." oninput="renderUsers()"
        class="flex-1 bg-transparent outline-none text-sm text-gray-700" />
    </div>

    <!-- Users list -->
    <div id="usersList"></div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-2xl z-50">
    <div class="grid grid-cols-4 h-16">
      <a href="admin-dashboard.html" class="flex flex-col items-center justify-center text-gray-400">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
        <span class="text-xs font-medium">Dashboard</span>
      </a>
      <a href="admin-usuarios.html" class="flex flex-col items-center justify-center" style="color:#FF7A00">
<svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
  <circle cx="9" cy="7" r="3" stroke-width="2"/>
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-1a6 6 0 016-6h0a6 6 0 016 6v1"/>
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 3.13a4 4 0 010 7.75"/>
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21v-1a4 4 0 00-3-3.85"/>
</svg>        <span class="text-xs font-semibold">Usuarios</span>
      </a>
      <a href="admin-reportes.html" class="flex flex-col items-center justify-center text-gray-400">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="text-xs font-medium">Reportes</span>
      </a>
      <a href="admin-configuracion.html" class="flex flex-col items-center justify-center text-gray-400">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>
        <span class="text-xs font-medium">Config</span>
      </a>
    </div>
  </nav>

  <script>
    (function() {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const userRole = localStorage.getItem('userRole');
      if (!isLoggedIn || userRole !== 'admin') { window.location.href = 'index.html'; return; }
    })();

    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }

    const users = [
      { id: 1, name: 'Ana Martínez', email: 'ana.martinez@uni.edu', role: 'Estudiante', bikes: 2, status: 'activo', initials: 'AM' },
      { id: 2, name: 'Carlos López', email: 'carlos.lopez@uni.edu', role: 'Estudiante', bikes: 1, status: 'activo', initials: 'CL' },
      { id: 3, name: 'María García', email: 'maria.garcia@uni.edu', role: 'Estudiante', bikes: 1, status: 'suspendido', initials: 'MG' },
      { id: 4, name: 'Juan Pérez', email: 'juan.perez@uni.edu', role: 'Estudiante', bikes: 3, status: 'activo', initials: 'JP' },
      { id: 5, name: 'Laura Torres', email: 'laura.torres@uni.edu', role: 'Guardia', bikes: 0, status: 'activo', initials: 'LT' },
      { id: 6, name: 'Pedro Ramírez', email: 'pedro.ramirez@uni.edu', role: 'Estudiante', bikes: 1, status: 'activo', initials: 'PR' },
    ];

    function toggleStatus(id) {
      const user = users.find(u => u.id === id);
      if (!user) return;
      user.status = user.status === 'activo' ? 'suspendido' : 'activo';
      renderUsers();
    }

    function renderUsers() {
      const search = (document.getElementById('searchInput').value || '').toLowerCase();
      const filtered = users.filter(u =>
        u.name.toLowerCase().includes(search) ||
        u.email.toLowerCase().includes(search) ||
        u.role.toLowerCase().includes(search)
      );

      const list = document.getElementById('usersList');

      if (filtered.length === 0) {
        list.innerHTML = '<div class="bg-white rounded-xl shadow-sm p-6 text-center text-gray-400 text-sm">No se encontraron usuarios</div>';
        return;
      }

      list.innerHTML = filtered.map(u => {
        const isActive = u.status === 'activo';
        return '<div class="bg-white rounded-xl shadow-sm p-4 mb-3">' +
          '<div class="flex items-center gap-3 mb-3">' +
            '<div class="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:#0376B2">' + u.initials + '</div>' +
            '<div class="flex-1 min-w-0">' +
              '<p class="text-sm font-semibold text-gray-800 truncate">' + u.name + '</p>' +
              '<p class="text-xs text-gray-400 truncate">' + u.email + '</p>' +
            '</div>' +
            '<span class="text-xs px-2 py-1 rounded-full font-semibold flex-shrink-0 ' +
              (isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600') + '">' +
              (isActive ? 'Activo' : 'Suspendido') +
            '</span>' +
          '</div>' +
          '<div class="flex items-center justify-between text-xs text-gray-500 mb-3">' +
            '<span>Rol: <strong>' + u.role + '</strong></span>' +
            '<span>Bicicletas: <strong>' + u.bikes + '</strong></span>' +
          '</div>' +
          '<button onclick="toggleStatus(' + u.id + ')" class="w-full py-2 rounded-lg text-sm font-semibold border-2 transition-all ' +
            (isActive
              ? 'border-red-300 text-red-600 hover:bg-red-50'
              : 'border-green-400 text-green-700 hover:bg-green-50') + '">' +
            (isActive ? 'Suspender Usuario' : 'Activar Usuario') +
          '</button>' +
        '</div>';
      }).join('');
    }

    renderUsers();
  </script>
</body>
</html>
