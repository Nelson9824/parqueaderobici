<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRide - Escáner QR</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="scanner-container">

        <div class="page-header">

            <h2>📷 Escáner QR</h2>

            <a href="dashboard.html" class="back-btn">
                ← Volver
            </a>

        </div>

        <div class="scanner-card">

            <h3>Escanee el código QR</h3>

            <p>
                Ubique el código QR dentro del área de escaneo.
            </p>

            <div class="scanner-box">

                <div class="scanner-frame"></div>

            </div>

            <div class="scan-result success">

                <h4>✓ Bicicleta Autorizada</h4>

                <p>
                    Registro válido encontrado.
                </p>

            </div>

            <button onclick="alert('Simulación de escaneo completada')">
                Simular Escaneo
            </button>

        </div>

    </div>

</body>
</html>
