    <!-- Notificaciones -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
      <h2 class="font-semibold mb-3" style="color:#044C71">Notificaciones</h2>
      <div id="notifList"></div>
    </div>

    <!-- Seguridad -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
      <h2 class="font-semibold mb-3" style="color:#044C71">Seguridad</h2>
      <div id="securityList"></div>
    </div>

    <!-- Sistema -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
      <h2 class="font-semibold mb-3" style="color:#044C71">Sistema</h2>
      <div id="sistemaList"></div>
    </div>

    <!-- Límites y Restricciones -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
      <h2 class="font-semibold mb-3" style="color:#044C71">Límites y Restricciones</h2>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-500 block mb-1">Máximo de bicicletas por usuario</label>
          <input id="maxBikes" type="number" value="3" min="1" max="10" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-800" />
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Tiempo máximo de parqueo (horas)</label>
          <input id="maxHours" type="number" value="12" min="1" max="24" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-800" />
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Intentos de acceso fallidos antes de bloqueo</label>
          <input id="maxAttempts" type="number" value="5" min="1" max="20" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-800" />
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Tiempo de sesión inactiva (minutos)</label>
          <input id="sessionTimeout" type="number" value="30" min="5" max="120" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-800" />
        </div>
        <button onclick="saveLimits()" class="w-full text-white rounded-lg py-2.5 text-sm font-semibold" style="background:#FF7A00">
          Guardar Límites
        </button>
      </div>
    </div>

    <!-- Gestión de Datos -->
    <div class="bg-white rounded-xl shadow-sm p-4">
      <h2 class="font-semibold mb-3" style="color:#044C71">Gestión de Datos</h2>
      <div class="space-y-3">
        <button onclick="exportData()" class="w-full border-2 border-blue-300 text-blue-700 rounded-lg py-2.5 text-sm font-semibold hover:bg-blue-50 transition-colors">
          Exportar Datos del Sistema
        </button>
        <button onclick="backupData()" class="w-full border-2 border-gray-300 text-gray-600 rounded-lg py-2.5 text-sm font-semibold hover:bg-gray-50 transition-colors">
          Crear Copia de Seguridad
        </button>
        <button onclick="confirmReset()" class="w-full border-2 border-red-300 text-red-600 rounded-lg py-2.5 text-sm font-semibold hover:bg-red-50 transition-colors">
          Restablecer Sistema
        </button>
      </div>
    </div>
  </main>

</svg>
        <span class="text-xs font-medium">Usuarios</span>
      </a>
      <a href="admin-reportes.html" class="flex flex-col items-center justify-center text-gray-400">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="text-xs font-medium">Reportes</span>
      </a>
      <a href="admin-configuracion.html" class="flex flex-col items-center justify-center" style="color:#FF7A00">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" stroke-width="2.5"/></svg>

  <script>
    (function() {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const userRole = localStorage.getItem('userRole');
      if (!isLoggedIn || userRole !== 'admin') { window.location.href = 'index.html'; return; }
    })();

    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }

    function saveParking() { alert('Configuración del parqueadero guardada.'); }
    function saveLimits() { alert('Límites y restricciones guardados.'); }
    function exportData() { alert('Exportando datos del sistema...'); }
    function backupData() { alert('Copia de seguridad creada.'); }
    function confirmReset() {
      if (confirm('¿Estás seguro de que deseas restablecer el sistema? Esta acción no se puede deshacer.')) {
        alert('Sistema restablecido.');
      }
    }

    // ── Notificaciones ──────────────────────────────────────────
    const notifSettings = [
      { label: 'Notificaciones del Sistema', desc: 'Activa las notificaciones en tiempo real', enabled: true },
      { label: 'Alertas por Email', desc: 'Enviar alertas importantes por correo', enabled: false },
      { label: 'Alertas de Incidentes', desc: 'Notificar nuevos incidentes reportados', enabled: true },
    ];

    function renderNotifs() {
      document.getElementById('notifList').innerHTML = notifSettings.map(function(s, i) {
        return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">' +
          '<div class="flex-1 mr-4">' +
            '<p class="text-sm font-medium text-gray-800">' + s.label + '</p>' +
            '<p class="text-xs text-gray-400">' + s.desc + '</p>' +
          '</div>' +
          '<button onclick="toggleNotif(' + i + ')" class="relative inline-flex h-6 w-11 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ' + (s.enabled ? 'bg-blue-500' : 'bg-gray-300') + '" style="outline:none">' +
            '<span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200 ' + (s.enabled ? 'translate-x-5' : 'translate-x-0') + '"></span>' +
          '</button>' +
        '</div>';
      }).join('');
    }
    function toggleNotif(i) { notifSettings[i].enabled = !notifSettings[i].enabled; renderNotifs(); }

    // ── Seguridad ───────────────────────────────────────────────
    const securitySettings = [
      { label: 'Verificación QR Obligatoria', desc: 'Requerir escaneo QR para cada acceso', enabled: true },
      { label: 'Registro de Actividad', desc: 'Guardar historial completo de accesos', enabled: true },
      { label: 'Cierre Automático de Sesión', desc: 'Cerrar sesiones inactivas automáticamente', enabled: false },
      { label: 'Doble Verificación de Guardia', desc: 'Confirmar acceso con guardia presente', enabled: false },
    ];

    function renderSecurity() {
      document.getElementById('securityList').innerHTML = securitySettings.map(function(s, i) {
        return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">' +
          '<div class="flex-1 mr-4">' +
            '<p class="text-sm font-medium text-gray-800">' + s.label + '</p>' +
            '<p class="text-xs text-gray-400">' + s.desc + '</p>' +
          '</div>' +
          '<button onclick="toggleSecurity(' + i + ')" class="relative inline-flex h-6 w-11 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ' + (s.enabled ? 'bg-blue-500' : 'bg-gray-300') + '" style="outline:none">' +
            '<span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200 ' + (s.enabled ? 'translate-x-5' : 'translate-x-0') + '"></span>' +
          '</button>' +
        '</div>';
      }).join('');
    }
    function toggleSecurity(i) { securitySettings[i].enabled = !securitySettings[i].enabled; renderSecurity(); }

    // ── Sistema ─────────────────────────────────────────────────
    const sistemaSettings = [
      { label: 'Modo Mantenimiento', desc: 'Suspender accesos temporalmente por mantenimiento', enabled: false },
      { label: 'Registro de Auditoría', desc: 'Guardar log detallado de acciones administrativas', enabled: true },
      { label: 'Acceso en Fines de Semana', desc: 'Permitir acceso los sábados y domingos', enabled: true },
      { label: 'Modo Prueba', desc: 'Activar entorno de pruebas sin afectar datos reales', enabled: false },
    ];

    function renderSistema() {
      document.getElementById('sistemaList').innerHTML = sistemaSettings.map(function(s, i) {
        return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">' +
          '<div class="flex-1 mr-4">' +
            '<p class="text-sm font-medium text-gray-800">' + s.label + '</p>' +
            '<p class="text-xs text-gray-400">' + s.desc + '</p>' +
          '</div>' +
          '<button onclick="toggleSistema(' + i + ')" class="relative inline-flex h-6 w-11 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ' + (s.enabled ? 'bg-blue-500' : 'bg-gray-300') + '" style="outline:none">' +
            '<span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200 ' + (s.enabled ? 'translate-x-5' : 'translate-x-0') + '"></span>' +
          '</button>' +
        '</div>';
      }).join('');
    }
    function toggleSistema(i) { sistemaSettings[i].enabled = !sistemaSettings[i].enabled; renderSistema(); }

    renderNotifs();
    renderSecurity();
    renderSistema();
  </script>
</body>
