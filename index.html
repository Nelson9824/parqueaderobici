<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRide - Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#044C71',
            secondary: '#0376B2',
            accent: '#FF7A00',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; background: #fff; }
    input::placeholder { color: #9ca3af; }
    .btn-orange { background:#FF7A00; color:#fff; border:none; border-radius:9999px; height:52px; width:100%; font-size:16px; font-weight:700; cursor:pointer; }
    .btn-orange:hover { background:#e06a00; }
    .input-field { background:#F1F5F9; border:none; border-radius:9999px; height:52px; width:100%; padding:0 1rem 0 3rem; font-size:14px; color:#044C71; outline:none; }
    .role-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px; border-radius:12px; border:2px solid #e2e8f0; background:#fff; cursor:pointer; font-size:11px; font-weight:600; color:#6b7a85; }
    .role-btn.active { border-color:#FF7A00; background:#FFF5EB; color:#FF7A00; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="flex flex-col items-center pt-10 pb-4 px-8 flex-1">
    <img src="image-1.png" alt="QRide" style="height:80px;object-fit:contain;" class="mb-2" />
    <p style="color:#6b7a85;font-size:13px;" class="mb-6" id="subtitle">Parqueadero de Bicicletas</p>

    <!-- Roles -->
    <div class="flex gap-2 mb-5 w-full" id="role-selector">
      <button class="role-btn active" onclick="selectRole('estudiante', this)">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Estudiante
      </button>
      <button class="role-btn" onclick="selectRole('guardia', this)">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Guardia
      </button>
      <button class="role-btn" onclick="selectRole('admin', this)">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="m2 4 3 12h14l3-12-6 5-4-7-4 7-6-5z"/></svg>
        Admin
      </button>
    </div>

    <!-- Email -->
    <div class="relative w-full mb-3">
      <svg class="absolute" style="left:14px;top:50%;transform:translateY(-50%);color:#044C71;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input class="input-field" type="email" id="email" placeholder="Correo electrónico" />
    </div>

    <!-- Password -->
    <div class="relative w-full mb-2">
      <svg class="absolute" style="left:14px;top:50%;transform:translateY(-50%);color:#044C71;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input class="input-field" type="password" id="password" placeholder="Contraseña" />
    </div>

    <button id="forgot-btn" style="font-size:12px;color:#0376B2;background:none;border:none;cursor:pointer;align-self:flex-start;margin-left:8px;margin-bottom:20px;" onclick="window.location='forgot.html'">¿Olvidó su contraseña?</button>

    <button class="btn-orange" onclick="handleLogin()" id="submit-btn">Ingresar</button>
    <button onclick="toggleRegister()" style="margin-top:16px;font-size:13px;color:#0376B2;background:none;border:none;cursor:pointer;" id="toggle-btn">Registrar</button>
  </div>

  <!-- Mountain decoration -->
  <div style="margin-bottom:-2px;">
    <svg viewBox="0 0 390 230" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;" preserveAspectRatio="xMidYMax meet">
      <path d="M 390 230 L 390 140 L 265 20 Q 248 4 228 16 L 105 140 L 105 230 Z" fill="#044C71"/>
      <path d="M -10 230 L -10 150 L 110 55 Q 128 38 148 55 L 285 185 Q 310 210 340 200 L 390 185 L 390 230 Z" fill="#0376B2"/>
    </svg>
  </div>
  <div style="background:#FF7A00;height:22px;width:100%;"></div>

  <script>
    let selectedRole = 'estudiante';
    let isRegister = false;

    function selectRole(role, btn) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleRegister() {
      isRegister = !isRegister;
      document.getElementById('subtitle').textContent = isRegister ? 'Crea tu cuenta' : 'Parqueadero de Bicicletas';
      document.getElementById('submit-btn').textContent = isRegister ? 'Registrarse' : 'Ingresar';
      document.getElementById('toggle-btn').textContent = isRegister ? '¿Ya tienes cuenta? Inicia sesión' : 'Registrar';
      document.getElementById('forgot-btn').style.display = isRegister ? 'none' : 'block';
    }

    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) { alert('Por favor completa todos los campos'); return; }
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userRole', selectedRole);
      localStorage.setItem('userEmail', email);
      if (selectedRole === 'guardia') window.location = 'guardia-scanner.html';
      else if (selectedRole === 'admin') window.location = 'admin-dashboard.html';
      else window.location = 'dashboard.html';
    }
  </script>
</body>
</html>
