<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRide - Iniciar Sesión</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-container">

        <div class="logo-section">

            <div class="logo-circle">
                <img src="img/Qride.png" alt="Logo QRide">
            </div>

            <p class="subtitle">
                Sistema Inteligente de Registro y Seguridad para Bicicletas
            </p>

        </div>

        <form class="login-form">

            <label for="correo">
                Correo institucional
            </label>

            <input
                type="email"
                id="correo"
                placeholder="ejemplo@unilibre.edu.co"
                required
            >

            <label for="password">
                Contraseña
            </label>

            <input
                type="password"
                id="password"
                placeholder="********"
                required
            >

            <button
                type="button"
                onclick="window.location.href='dashboard.html'">

                Iniciar Sesión

            </button>

        </form>

        <div class="footer-text">
            Universidad Libre • Proyecto Académico
        </div>

    </div>

</body>
</html>
